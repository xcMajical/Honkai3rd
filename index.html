<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>崩坏三 深渊排期邦邦</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #07080f;
    --bg2: #0d0f1e;
    --bg3: #12152a;
    --accent: #c8a96e;
    --accent2: #e8c97e;
    --red: #e05555;
    --blue: #5588e0;
    --text: #e8e0d0;
    --text2: #a09880;
    --border: rgba(200,169,110,0.2);
    --glow: rgba(200,169,110,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(85,136,224,0.05) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(200,169,110,0.02) 80px, rgba(200,169,110,0.02) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(200,169,110,0.02) 80px, rgba(200,169,110,0.02) 81px);
    pointer-events: none;
    z-index: 0;
  }

  /* Nav */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(7,8,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .nav-logo::before {
    content: '⚔';
    font-size: 1rem;
  }

  .nav-links {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .nav-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text2);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.85rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .nav-btn:hover, .nav-btn.active {
    color: var(--accent);
    border-color: var(--border);
    background: var(--glow);
  }

  .nav-btn.primary {
    background: var(--accent);
    color: #07080f;
    font-weight: 600;
    border-color: var(--accent);
  }

  .nav-btn.primary:hover {
    background: var(--accent2);
    color: #07080f;
  }

  /* Main */
  main {
    position: relative;
    z-index: 1;
    padding-top: 60px;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 5rem 2rem 3rem;
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.8;
  }

  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .hero h1 span {
    color: var(--accent);
  }

  .hero-sub {
    color: var(--text2);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 2rem auto;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 0 2rem 2rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem;
    padding: 0.7rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  .tab:last-child { border-right: none; }

  .tab.active {
    background: var(--glow);
    color: var(--accent);
  }

  .tab:hover:not(.active) {
    background: rgba(200,169,110,0.05);
    color: var(--text);
  }

  /* Section */
  .section {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    display: none;
  }

  .section.active { display: block; }

  /* Schedule Cards */
  .schedule-grid {
    display: grid;
    gap: 1.5rem;
  }

  .schedule-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .schedule-card:hover {
    border-color: rgba(200,169,110,0.4);
    box-shadow: 0 0 30px var(--glow);
  }

  .card-header {
    padding: 1.2rem 1.5rem;
    background: linear-gradient(90deg, var(--bg3), var(--bg2));
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }

  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .card-period {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    color: var(--text2);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .card-body {
    padding: 1.2rem 1.5rem;
  }

  .card-description {
    color: var(--text2);
    font-size: 0.88rem;
    line-height: 1.7;
    margin-bottom: 1rem;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .tag {
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .tag-boss { background: rgba(224,85,85,0.15); color: #e08080; border: 1px solid rgba(224,85,85,0.3); }
  .tag-mechanic { background: rgba(85,136,224,0.15); color: #88aaee; border: 1px solid rgba(85,136,224,0.3); }
  .tag-current { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid var(--border); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text2);
    font-size: 0.9rem;
  }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  /* Order Form */
  .form-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
  }

  .form-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 1.5rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.8rem;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .required { color: var(--red); margin-left: 2px; }

  input, select, textarea {
    background: var(--bg3);
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.88rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(200,169,110,0.1);
  }

  select option { background: var(--bg3); }

  textarea { resize: vertical; min-height: 80px; }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 2px;
    color: #07080f;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Auth */
  .auth-card {
    max-width: 420px;
    margin: 0 auto;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
  }

  .auth-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.2rem;
    color: var(--accent);
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .auth-sub {
    text-align: center;
    color: var(--text2);
    font-size: 0.82rem;
    margin-bottom: 1.8rem;
  }

  .auth-toggle {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 0.82rem;
    color: var(--text2);
  }

  .auth-toggle a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  .auth-toggle a:hover { text-decoration: underline; }

  /* Admin */
  .admin-section { margin-bottom: 3rem; }

  .admin-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .orders-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }

  .orders-table th {
    background: var(--bg3);
    color: var(--text2);
    font-weight: 500;
    padding: 0.6rem 0.8rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .orders-table td {
    padding: 0.7rem 0.8rem;
    border-bottom: 1px solid rgba(200,169,110,0.08);
    color: var(--text);
    vertical-align: top;
  }

  .orders-table tr:hover td { background: rgba(200,169,110,0.03); }

  .status-badge {
    display: inline-block;
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .status-pending { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid var(--border); }
  .status-done { background: rgba(85,200,100,0.15); color: #88dd99; border: 1px solid rgba(85,200,100,0.3); }
  .status-cancelled { background: rgba(200,85,85,0.15); color: #dd8888; border: 1px solid rgba(200,85,85,0.3); }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 0.3rem;
  }

  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.danger:hover { border-color: var(--red); color: var(--red); }

  /* Alert */
  .alert {
    padding: 0.7rem 1rem;
    border-radius: 2px;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }

  .alert.show { display: block; }
  .alert-success { background: rgba(85,200,100,0.1); border: 1px solid rgba(85,200,100,0.3); color: #88dd99; }
  .alert-error { background: rgba(200,85,85,0.1); border: 1px solid rgba(200,85,85,0.3); color: #dd8888; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--text2);
    font-size: 0.85rem;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* User info bar */
  .user-bar {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.8rem 1.2rem;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
  }

  .user-bar-info { color: var(--text2); }
  .user-bar-info span { color: var(--accent); }

  /* Responsive */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .hero { padding: 3rem 1.5rem 2rem; }
    nav { padding: 0 1rem; }
    .orders-table { display: block; overflow-x: auto; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">崩坏三 深渊排期邦邦</div>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn active" onclick="showTab('schedule')">排期表</button>
    <button class="nav-btn" onclick="showTab('order')">申请代打</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="showTab('admin')">管理后台</button>
    <button class="nav-btn" id="authBtn" onclick="showTab('auth')">登录</button>
    <div id="userInfo" style="display:none;align-items:center;gap:0.6rem">
      <div style="display:flex;align-items:center;gap:0.5rem;background:rgba(200,169,110,0.08);border:1px solid rgba(200,169,110,0.2);border-radius:2px;padding:0.3rem 0.7rem">
        <span style="width:7px;height:7px;background:#88dd99;border-radius:50%;display:inline-block"></span>
        <span id="navUserEmail" style="font-size:0.78rem;color:var(--accent);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </div>
      <button class="nav-btn" onclick="logout()">退出</button>
    </div>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-eyebrow">Honkai Impact 3rd · Abyss Hub</div>
    <h1>深<span>渊</span></h1>
    <p class="hero-sub">深渊排期 · 代打服务 · 饱饱专属</p>
    <div class="divider"></div>
  </div>

  <!-- Schedule Tab -->
  <div class="section active" id="tab-schedule">
    <div class="tabs">
      <button class="tab active" onclick="filterSchedule('current', this)">当期深渊</button>
      <button class="tab" onclick="filterSchedule('all', this)">历史记录</button>
    </div>
    <div class="schedule-grid" id="scheduleList">
      <div class="loading"><span class="spinner"></span>加载中...</div>
    </div>
  </div>

  <!-- Order Tab -->
  <div class="section" id="tab-order">
    <div id="orderLoginPrompt" style="display:none">
      <div class="auth-card">
        <div class="auth-title">需要登录</div>
        <div class="auth-sub" style="margin-bottom:1rem">请先登录后再申请代打服务</div>
        <button class="submit-btn" onclick="showTab('auth')">前往登录</button>
      </div>
    </div>
    <div id="orderFormWrap">
      <div class="user-bar" id="orderUserBar" style="display:none">
        <div class="user-bar-info">当前用户：<span id="orderUserEmail"></span></div>
      </div>
      <div class="form-card">
        <div class="form-title">⚔ 深渊代打申请</div>
        <div class="alert" id="orderAlert"></div>
        <div class="form-row">
          <div class="form-group">
            <label>游戏昵称 <span class="required">*</span></label>
            <input type="text" id="gameName" placeholder="你的游戏内昵称">
          </div>
          <div class="form-group">
            <label>服务器 <span class="required">*</span></label>
            <select id="server">
              <option value="">请选择</option>
              <option>全平台桌面服</option>
              <option>安卓服</option>
              <option>iOS服</option>
              <option>B服</option>
              <option>三服（华为/OPPO/vivo）</option>
              <option>四服（九游/小米/Steam）</option>
              <option>应用宝服</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>代打层数 <span class="required">*</span></label>
            <select id="floor">
              <option value="">请选择</option>
              <option>仅小怪层</option>
              <option>仅Boss层</option>
              <option>小怪层+Boss层</option>
            </select>
          </div>
          <div class="form-group">
            <label>联系方式 <span class="required">*</span></label>
            <input type="text" id="contact" placeholder="QQ号或微信号">
          </div>
        </div>
        <div class="form-group">
          <label>备注说明</label>
          <textarea id="remark" placeholder="例如：需要三星过关、卡了哪个Boss、账号密码会私聊..."></textarea>
        </div>
        <button class="submit-btn" id="submitOrderBtn" onclick="openPayModal()">提交代打申请</button>
      </div>
    </div>
  </div>

  <!-- Auth Tab -->
  <div class="section" id="tab-auth">
    <div class="auth-card">
      <div class="auth-title" id="authTitle">登录账号</div>
      <div class="auth-sub" id="authSub">使用邮箱登录以申请代打服务</div>
      <div class="alert" id="authAlert"></div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="authEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="authPassword" placeholder="至少6位">
      </div>
      <div class="form-group" id="authNicknameGroup" style="display:none">
        <label>昵称（可选）</label>
        <input type="text" id="authNickname" placeholder="群昵称">
      </div>
      <button class="submit-btn" id="authSubmitBtn" onclick="handleAuth()">登录</button>
      <div class="auth-toggle">
        <span id="authToggleText">还没有账号？</span>
        <a onclick="toggleAuthMode()"><span id="authToggleLink">立即注册</span></a>
      </div>
    </div>
  </div>

  <!-- Admin Tab -->
  <div class="section" id="tab-admin">
    <div class="admin-section">
      <div class="admin-title">📋 添加深渊排期</div>
      <div class="form-card">
        <div class="alert" id="scheduleAlert"></div>
        <div class="form-row">
          <div class="form-group">
            <label>期数标题 <span class="required">*</span></label>
            <input type="text" id="s_title" placeholder="例：第114期深渊">
          </div>
          <div class="form-group">
            <label>当前状态</label>
            <select id="s_is_current">
              <option value="true">当期（显示标签）</option>
              <option value="false">历史</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>开始时间</label>
            <input type="date" id="s_start">
          </div>
          <div class="form-group">
            <label>结束时间</label>
            <input type="date" id="s_end">
          </div>
        </div>
        <div class="form-group">
          <label>Boss/机制描述</label>
          <input type="text" id="s_boss" placeholder="例：深空诸天、空间异常">
        </div>
        <div class="form-group">
          <label>详细说明</label>
          <textarea id="s_desc" placeholder="深渊机制介绍、推荐角色、注意事项..."></textarea>
        </div>
        <button class="submit-btn" onclick="addSchedule()">发布排期</button>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-title">📅 排期管理</div>
      <div id="adminSchedules">
        <div class="loading"><span class="spinner"></span>加载中...</div>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-title">📬 代打订单管理</div>
      <div id="adminOrders">
        <div class="loading"><span class="spinner"></span>加载中...</div>
      </div>
    </div>
  </div>

  <!-- Edit Schedule Modal -->
  <div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:2rem;width:90%;max-width:520px;max-height:90vh;overflow-y:auto">
      <div style="font-family:'Noto Serif SC',serif;color:var(--accent);font-size:1rem;margin-bottom:1.5rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border)">✏️ 编辑排期</div>
      <input type="hidden" id="edit_id">
      <div class="form-row">
        <div class="form-group">
          <label>期数标题 <span class="required">*</span></label>
          <input type="text" id="edit_title">
        </div>
        <div class="form-group">
          <label>开始时间</label>
          <input type="date" id="edit_start">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>结束时间</label>
          <input type="date" id="edit_end">
        </div>
        <div class="form-group">
          <label>Boss/机制</label>
          <input type="text" id="edit_boss">
        </div>
      </div>
      <div class="form-group">
        <label>详细说明</label>
        <textarea id="edit_desc"></textarea>
      </div>
      <div style="display:flex;gap:0.8rem;margin-top:0.5rem">
        <button class="submit-btn" onclick="saveEdit()" style="flex:1">保存修改</button>
        <button class="submit-btn" onclick="closeModal()" style="flex:0.4;background:var(--bg3);color:var(--text2);border:1px solid var(--border)">取消</button>
      </div>
    </div>
  </div>

  <!-- Payment Modal -->

<script>
const SUPABASE_URL = 'https://adnqaaddhtcxtvudhsxa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_degI4WAl0XeidgbZg1XFkw_Uvrjsjzg';
const ADMIN_EMAIL = 'admin@yourdomain.com'; // 改成你的管理员邮箱

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let isRegisterMode = false;
let scheduleFilter = 'current';

// ─── Nav & Tabs ───────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'schedule') loadSchedule();
  if (name === 'admin') { loadAdminOrders(); loadAdminSchedules(); }
  if (name === 'order') updateOrderUI();
}

// ─── Auth ─────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) setUser(session.user);
  sb.auth.onAuthStateChange((_, session) => {
    if (session) setUser(session.user);
    else clearUser();
  });
}

function setUser(user) {
  currentUser = user;
  document.getElementById('authBtn').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('navUserEmail').textContent = user.email;
  if (user.email === ADMIN_EMAIL) {
    document.getElementById('adminBtn').style.display = 'inline-block';
  }
  updateOrderUI();
}

function clearUser() {
  currentUser = null;
  document.getElementById('authBtn').style.display = 'inline-block';
  document.getElementById('userInfo').style.display = 'none';
  document.getElementById('adminBtn').style.display = 'none';
}

function updateOrderUI() {
  if (currentUser) {
    document.getElementById('orderLoginPrompt').style.display = 'none';
    document.getElementById('orderFormWrap').style.display = 'block';
    document.getElementById('orderUserBar').style.display = 'flex';
    document.getElementById('orderUserEmail').textContent = currentUser.email;
  } else {
    document.getElementById('orderLoginPrompt').style.display = 'block';
    document.getElementById('orderFormWrap').style.display = 'none';
  }
}

function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('authTitle').textContent = isRegisterMode ? '注册账号' : '登录账号';
  document.getElementById('authSub').textContent = isRegisterMode ? '创建新账号加入群友社区' : '使用邮箱登录以申请代打服务';
  document.getElementById('authSubmitBtn').textContent = isRegisterMode ? '注册' : '登录';
  document.getElementById('authToggleText').textContent = isRegisterMode ? '已有账号？' : '还没有账号？';
  document.getElementById('authToggleLink').textContent = isRegisterMode ? '返回登录' : '立即注册';
  document.getElementById('authNicknameGroup').style.display = isRegisterMode ? 'flex' : 'none';
  hideAlert('authAlert');
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) return showAlert('authAlert', 'error', '请填写邮箱和密码');

  document.getElementById('authSubmitBtn').disabled = true;
  document.getElementById('authSubmitBtn').textContent = '处理中...';

  let error;
  if (isRegisterMode) {
    const { error: e } = await sb.auth.signUp({ email, password });
    error = e;
    if (!e) showAlert('authAlert', 'success', '注册成功！请检查邮箱验证链接后登录。');
  } else {
    const { data, error: e } = await sb.auth.signInWithPassword({ email, password });
    error = e;
    if (!e) { showAlert('authAlert', 'success', '登录成功！正在跳转...'); setTimeout(() => showTab('schedule'), 1200); }
  }

  if (error) showAlert('authAlert', 'error', error.message);
  document.getElementById('authSubmitBtn').disabled = false;
  document.getElementById('authSubmitBtn').textContent = isRegisterMode ? '注册' : '登录';
}

async function logout() {
  await sb.auth.signOut();
  showTab('schedule');
}

// ─── Schedule ─────────────────────────────────────────────
function filterSchedule(type, btn) {
  scheduleFilter = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadSchedule();
}

async function loadSchedule() {
  const el = document.getElementById('scheduleList');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';

  let query = sb.from('schedules').select('*').order('start_date', { ascending: false });
  if (scheduleFilter === 'current') {
    const today = new Date().toISOString().split('T')[0];
    query = query.lte('start_date', today).gte('end_date', today);
  }

  const { data, error } = await query;
  if (error || !data || data.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>暂无排期数据<br><small style="margin-top:0.3rem;display:block">管理员尚未发布排期信息</small></div></div>';
    return;
  }

  const today = new Date().toISOString().split('T')[0];
  el.innerHTML = data.map(s => {
    const isCurrent = s.start_date && s.end_date && s.start_date <= today && s.end_date >= today;
    return `
    <div class="schedule-card">
      <div class="card-header">
        <div class="card-title">${esc(s.title)}</div>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          ${isCurrent ? '<span class="tag tag-current">当期</span>' : ''}
          ${s.start_date && s.end_date ? `<span class="card-period">${s.start_date} ~ ${s.end_date}</span>` : ''}
        </div>
      </div>
      <div class="card-body">
        ${s.description ? `<div class="card-description">${esc(s.description)}</div>` : ''}
        ${s.boss_info ? `<div class="tags">
          ${s.boss_info.split('、').map(b => `<span class="tag tag-boss">${esc(b.trim())}</span>`).join('')}
        </div>` : ''}
      </div>
    </div>
  `;}).join('');
}

async function addSchedule() {
  const title = document.getElementById('s_title').value.trim();
  if (!title) return showAlert('scheduleAlert', 'error', '请填写期数标题');

  const { error } = await sb.from('schedules').insert({
    title,
    is_current: document.getElementById('s_is_current').value === 'true',
    start_date: document.getElementById('s_start').value || null,
    end_date: document.getElementById('s_end').value || null,
    boss_info: document.getElementById('s_boss').value.trim() || null,
    description: document.getElementById('s_desc').value.trim() || null,
  });

  if (error) return showAlert('scheduleAlert', 'error', '发布失败：' + error.message);
  showAlert('scheduleAlert', 'success', '排期发布成功！');
  ['s_title','s_boss','s_desc','s_start','s_end'].forEach(id => document.getElementById(id).value = '');
}

// ─── Orders ───────────────────────────────────────────────
function getPrice(floor) {
  if (!floor) return null;
  if (floor === '仅小怪层') return '3r';
  if (floor === '仅Boss层') {
    return '根据Boss层难度收费（红莲2r / 寂灭4r / 苦痛及以下免费）';
  }
  if (floor === '小怪层+Boss层') {
    return '小怪层3r + Boss层（红莲2r / 寂灭4r / 苦痛及以下免费）';
  }
  return null;
}

function openPayModal() {
  if (!currentUser) return;
  const gameName = document.getElementById('gameName').value.trim();
  const server = document.getElementById('server').value;
  const floor = document.getElementById('floor').value;
  const contact = document.getElementById('contact').value.trim();
  if (!gameName || !server || !floor || !contact) return showAlert('orderAlert', 'error', '请填写所有必填项');

  const price = getPrice(floor);
  const priceEl = document.getElementById('payPriceInfo');
  priceEl.innerHTML = `
    <div style="margin-bottom:0.4rem">📋 <b style="color:var(--text)">代打类型：</b>${floor}</div>
    <div style="margin-bottom:0.4rem">💰 <b style="color:var(--text)">收费标准：</b></div>
    <div style="padding-left:1rem;color:var(--accent)">
      苦痛及以下 → 免费<br>
      红莲 → 2r<br>
      寂灭 → 4r<br>
      小怪层 → 3r
    </div>
  `;

  document.getElementById('payModal').style.display = 'flex';
  showQR('wechat');
}

function showQR(type) {
  document.getElementById('qrWechat').style.display = type === 'wechat' ? 'block' : 'none';
  document.getElementById('qrAlipay').style.display = type === 'alipay' ? 'block' : 'none';
}

function closePayModal() {
  document.getElementById('payModal').style.display = 'none';
}

async function confirmPayAndSubmit() {
  if (!currentUser) return;
  const gameName = document.getElementById('gameName').value.trim();
  const server = document.getElementById('server').value;
  const floor = document.getElementById('floor').value;
  const contact = document.getElementById('contact').value.trim();

  const { error } = await sb.from('orders').insert({
    user_id: currentUser.id,
    user_email: currentUser.email,
    game_name: gameName,
    server,
    floor,
    contact,
    remark: document.getElementById('remark').value.trim() || null,
    status: 'pending',
  });

  if (error) { closePayModal(); return showAlert('orderAlert', 'error', '提交失败：' + error.message); }
  closePayModal();
  showAlert('orderAlert', 'success', '申请已提交！请等待管理员联系你的QQ/微信。');
  ['gameName','contact','remark'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('server').value = '';
  document.getElementById('floor').value = '';
}

async function submitOrder() {
  openPayModal();
}

async function loadAdminSchedules() {
  const el = document.getElementById('adminSchedules');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';
  const { data, error } = await sb.from('schedules').select('*').order('start_date', { ascending: false });
  if (error || !data || data.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无排期</div>';
    return;
  }
  const today = new Date().toISOString().split('T')[0];
  el.innerHTML = `<div style="overflow-x:auto"><table class="orders-table">
    <thead><tr>
      <th>期数标题</th><th>开始日期</th><th>结束日期</th><th>Boss/机制</th><th>状态</th><th>操作</th>
    </tr></thead>
    <tbody>${data.map(s => {
      const isCurrent = s.start_date && s.end_date && s.start_date <= today && s.end_date >= today;
      return `<tr>
        <td>${esc(s.title)}</td>
        <td>${s.start_date || '—'}</td>
        <td>${s.end_date || '—'}</td>
        <td>${s.boss_info ? esc(s.boss_info) : '<span style="color:var(--text2)">—</span>'}</td>
        <td><span class="status-badge ${isCurrent ? 'status-done' : 'status-pending'}">${isCurrent ? '当期' : '历史'}</span></td>
        <td>
          <button class="action-btn" onclick="editSchedule('${s.id}','${esc(s.title)}','${s.start_date||''}','${s.end_date||''}','${esc(s.boss_info||'')}','${esc(s.description||'')}')">✏️ 编辑</button>
          <button class="action-btn danger" onclick="deleteSchedule('${s.id}')">🗑 删除</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function editSchedule(id, title, start, end, boss, desc) {
  document.getElementById('edit_id').value = id;
  document.getElementById('edit_title').value = title;
  document.getElementById('edit_start').value = start;
  document.getElementById('edit_end').value = end;
  document.getElementById('edit_boss').value = boss;
  document.getElementById('edit_desc').value = desc;
  document.getElementById('editModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('editModal').style.display = 'none';
}

async function saveEdit() {
  const id = document.getElementById('edit_id').value;
  const title = document.getElementById('edit_title').value.trim();
  if (!title) return alert('请填写期数标题');
  const { error } = await sb.from('schedules').update({
    title,
    start_date: document.getElementById('edit_start').value || null,
    end_date: document.getElementById('edit_end').value || null,
    boss_info: document.getElementById('edit_boss').value.trim() || null,
    description: document.getElementById('edit_desc').value.trim() || null,
  }).eq('id', id);
  if (error) return alert('保存失败：' + error.message);
  closeModal();
  loadAdminSchedules();
  loadSchedule();
}

async function deleteSchedule(id) {
  if (!confirm('确定要删除这条排期吗？')) return;
  const { error } = await sb.from('schedules').delete().eq('id', id);
  if (error) return alert('删除失败：' + error.message);
  loadAdminSchedules();
  loadSchedule();
}

async function loadAdminOrders() {
  const el = document.getElementById('adminOrders');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';

  const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  if (error) { el.innerHTML = '<div class="empty">加载失败</div>'; return; }
  if (!data || data.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无订单</div>'; return; }

  const statusLabel = { pending: '待处理', done: '已完成', cancelled: '已取消' };
  el.innerHTML = `<div style="overflow-x:auto"><table class="orders-table">
    <thead><tr>
      <th>提交时间</th><th>游戏昵称</th><th>服务器</th><th>层数</th><th>联系方式</th><th>备注</th><th>状态</th><th>操作</th>
    </tr></thead>
    <tbody>${data.map(o => `<tr>
      <td style="white-space:nowrap">${new Date(o.created_at).toLocaleDateString('zh-CN')}</td>
      <td>${esc(o.game_name)}</td>
      <td>${esc(o.server)}</td>
      <td>${esc(o.floor)}</td>
      <td>${esc(o.contact)}</td>
      <td>${o.remark ? esc(o.remark) : '<span style="color:var(--text2)">—</span>'}</td>
      <td><span class="status-badge status-${o.status}">${statusLabel[o.status] || o.status}</span></td>
      <td>
        ${o.status !== 'done' ? `<button class="action-btn" onclick="updateOrder('${o.id}','done')">✓ 完成</button>` : ''}
        ${o.status !== 'cancelled' ? `<button class="action-btn danger" onclick="updateOrder('${o.id}','cancelled')">✗ 取消</button>` : ''}
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function updateOrder(id, status) {
  await sb.from('orders').update({ status }).eq('id', id);
  loadAdminOrders();
}

// ─── Utils ────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = `alert alert-${type} show`;
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 4000);
}

function hideAlert(id) {
  document.getElementById(id).classList.remove('show');
}

// ─── Init ─────────────────────────────────────────────────
initAuth();
loadSchedule();
</script>
</body>
</html>
